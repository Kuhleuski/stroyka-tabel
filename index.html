<!DOCTYPE html>
<html lang="ru">
<head>

    <link rel="stylesheet" href="styles/main.css">
</head>
<body>

        <span class="header-version">v0.3</span>

                    <button class="view-mode-btn active" data-mode="month">Месяц</button>
                </div>

                    <button class="calendar-nav-btn" id="prevMonth">‹</button>
